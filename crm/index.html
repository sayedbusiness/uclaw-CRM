<!--
  UCL COMMAND CENTER — GoHighLevel-style CRM for United Citizen Law
  (Apex Growth Corp, July 2026). Single file, local-first, $0 license.
  Features: email/password accounts (per-account data) · Dashboard · Conversations
  (threaded SMS/email inbox) · Contacts pipeline · Dialer · Calendar · Automations
  (trigger→action workflow builder that EXECUTES, incl. waits) · Reviews · Settings
  (Twilio + webhook). Sends via n8n-webhook-relay first, then Twilio, then copy.
  In the claude.ai preview, outbound network calls are sandboxed; host the file
  (Vercel/Netlify/office PC) and they fire. Everything else runs here.
  Note: browser localStorage auth is for evaluation — production uses server-side
  auth (bcrypt) + a hosted DB. Passwords here are salted-hashed, never plaintext.
-->
<meta charset="utf-8">
<title>UCL Command Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#08080a;--panel:#101014;--panel-2:#16161c;--panel-3:#1c1c24;--line:rgba(255,255,255,.09);
  --gold:#d4a72c;--gold-hi:#f0cf6a;--gold-dim:rgba(212,167,44,.14);
  --txt:#eceadf;--mut:#98937f;--mut2:#6f6b5c;--ok:#5abd8c;--ok-dim:rgba(90,189,140,.14);
  --warn:#e8b355;--bad:#e8705a;--bad-dim:rgba(232,112,90,.14);--blue:#6ba9e8;
  --serif:"Didot","Bodoni MT","Playfair Display",Palatino,Georgia,serif;
  --sans:"Avenir Next","Avenir","Segoe UI","Helvetica Neue",Arial,sans-serif;
  --ease:cubic-bezier(.32,.72,0,1);
}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:.94rem;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:var(--serif);font-weight:500;line-height:1.15}
button{font:inherit;cursor:pointer;color:inherit}
a{color:var(--gold-hi)}
:focus-visible{outline:2px solid var(--gold-hi);outline-offset:2px;border-radius:4px}
input,select,textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:.55rem;color:var(--txt);padding:.6rem .75rem;font:inherit;font-size:.92rem}
input:focus,select:focus,textarea:focus{border-color:var(--gold);outline:none}
label{display:block;font-size:.74rem;font-weight:700;color:var(--mut);letter-spacing:.05em;text-transform:uppercase;margin:.7rem 0 .3rem}
.phonefield{display:flex;align-items:stretch;background:var(--panel-2);border:1px solid var(--line);border-radius:.55rem;overflow:hidden}
.phonefield:focus-within{border-color:var(--gold)}
.phonefield.err{border-color:var(--bad)}
.phonefield .cc{display:flex;align-items:center;gap:.3rem;padding:.6rem .7rem;background:var(--panel-3);color:var(--txt);font-weight:700;font-size:.9rem;white-space:nowrap;border-right:1px solid var(--line)}
.phonefield input{border:0;border-radius:0;background:transparent}
.phonefield input:focus{border:0}
.fieldhint{font-size:.74rem;color:var(--mut2);margin:.3rem 0 0;text-transform:none}
.errmsg{color:var(--bad);font-size:.78rem;font-weight:600;margin:.35rem 0 0}
.num{font-variant-numeric:tabular-nums}
.muted{color:var(--mut)}.small{font-size:.82rem}
.hidden{display:none!important}
.pill{display:inline-flex;align-items:center;gap:.3rem;font-size:.7rem;font-weight:700;letter-spacing:.05em;border-radius:999px;padding:.16rem .6rem;border:1px solid var(--line);color:var(--mut);white-space:nowrap}
.pill.gold{background:var(--gold-dim);border-color:rgba(212,167,44,.35);color:var(--gold-hi)}
.pill.hot{background:var(--bad-dim);border-color:rgba(232,112,90,.4);color:var(--bad)}
.pill.ok{background:var(--ok-dim);border-color:rgba(90,189,140,.35);color:var(--ok)}
.pill.warn{background:rgba(232,179,85,.12);border-color:rgba(232,179,85,.4);color:var(--warn)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;background:var(--panel-2);border:1px solid var(--line);color:var(--txt);border-radius:.6rem;padding:.55rem .95rem;font-weight:600;font-size:.86rem;min-height:2.4rem;transition:border-color .3s var(--ease),transform .2s var(--ease)}
.btn:hover{border-color:rgba(212,167,44,.45)}
.btn:active{transform:scale(.98)}
.btn.gold{background:linear-gradient(155deg,var(--gold-hi),var(--gold));border:0;color:#161003;font-weight:800}
.btn.ghost{background:none}
.btn.danger{border-color:rgba(232,112,90,.4);color:var(--bad)}
.btn.sm{padding:.35rem .7rem;min-height:2rem;font-size:.8rem}
.card{background:var(--panel);border:1px solid var(--line);border-radius:1rem;padding:1.1rem 1.2rem}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th,td{text-align:left;padding:.55rem .6rem;border-bottom:1px solid var(--line);vertical-align:middle}
th{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mut)}
/* ── AUTH ── */
.authwrap{min-height:100vh;display:grid;place-items:center;padding:1.5rem;background:radial-gradient(120% 100% at 50% -10%,#15150f,#08080a)}
.authcard{width:min(26rem,100%);background:var(--panel);border:1px solid var(--line);border-radius:1.3rem;padding:2rem;box-shadow:0 40px 80px -30px rgba(0,0,0,.7)}
.authcard .logo{font-family:var(--serif);font-size:1.4rem;letter-spacing:.05em;text-align:center;margin-bottom:.3rem}
.authcard .logo b{color:var(--gold-hi);font-weight:500}
.authcard .tag{text-align:center;color:var(--mut);font-size:.85rem;margin-bottom:1.5rem}
.authcard .btn.gold{width:100%;margin-top:1.2rem;min-height:2.9rem;font-size:1rem}
.autherr{color:var(--bad);font-size:.85rem;margin-top:.8rem;display:none}
.autherr.show{display:block}
.authswap{text-align:center;margin-top:1.2rem;font-size:.85rem;color:var(--mut)}
.authswap button{background:none;border:0;color:var(--gold-hi);font-weight:700;text-decoration:underline}
.demohint{margin-top:1.3rem;padding:.7rem .9rem;background:var(--gold-dim);border:1px solid rgba(212,167,44,.3);border-radius:.6rem;font-size:.78rem;color:var(--gold-hi)}
/* ── APP SHELL ── */
.app{display:grid;grid-template-columns:15rem 1fr;min-height:100vh}
.side{background:#0b0b0e;border-right:1px solid var(--line);padding:1.1rem .8rem;display:flex;flex-direction:column;gap:.2rem;position:sticky;top:0;height:100vh;overflow-y:auto}
.side .logo{font-family:var(--serif);font-size:1.1rem;letter-spacing:.04em;padding:.4rem .6rem 1rem}
.side .logo b{color:var(--gold-hi);font-weight:500}
.navi{display:flex;align-items:center;gap:.7rem;padding:.6rem .7rem;border-radius:.6rem;color:var(--mut);font-weight:600;font-size:.9rem;border:1px solid transparent;text-align:left;width:100%;background:none;position:relative}
.navi:hover{color:var(--txt);background:var(--panel-2)}
.navi.on{color:var(--gold-hi);background:var(--gold-dim);border-color:rgba(212,167,44,.3)}
.navi svg{flex:none}
.navi .badge{margin-left:auto;background:var(--bad);color:#fff;font-size:.65rem;font-weight:800;border-radius:999px;padding:.05rem .4rem;min-width:1.2rem;text-align:center}
.side .spacer{flex:1}
.side .acct{border-top:1px solid var(--line);padding-top:.8rem;margin-top:.4rem;font-size:.8rem;color:var(--mut)}
.side .acct b{color:var(--txt);display:block;font-family:var(--sans);font-weight:700}
.main{overflow:hidden;display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;gap:1rem;padding:.9rem 1.4rem;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(8,8,10,.85);backdrop-filter:blur(12px);z-index:20}
.topbar h1{font-size:1.3rem}
.topbar .grow{flex:1}
.content{padding:1.4rem;flex:1}
@media(max-width:52rem){
  .app{grid-template-columns:1fr}
  .side{position:fixed;z-index:60;width:15rem;transform:translateX(-102%);transition:transform .4s var(--ease)}
  .side.open{transform:none}
  .menutoggle{display:inline-flex!important}
}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55;display:none}
.scrim.show{display:block}
.menutoggle{display:none;background:var(--panel-2);border:1px solid var(--line);border-radius:.5rem;width:2.4rem;height:2.4rem;align-items:center;justify-content:center}
/* ── DASHBOARD ── */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(11rem,1fr));gap:.9rem}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:1rem;padding:1.1rem}
.tile .big{font-family:var(--serif);font-size:2rem;color:var(--gold-hi);line-height:1.1}
.tile.alarm{border-color:rgba(232,112,90,.5)}.tile.alarm .big{color:var(--bad)}
.tile .lbl{font-size:.76rem;color:var(--mut);margin-top:.3rem}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:1rem;margin-top:1rem}
@media(max-width:60rem){.two-col{grid-template-columns:1fr}}
.note{background:var(--panel-2);border:1px solid var(--line);border-radius:.6rem;padding:.55rem .8rem;font-size:.86rem;margin-bottom:.5rem}
/* ── PIPELINE ── */
.board{display:grid;grid-template-columns:repeat(5,minmax(13rem,1fr));gap:.8rem;overflow-x:auto;align-items:start}
.col{background:var(--panel);border:1px solid var(--line);border-radius:1rem;padding:.7rem;min-height:7rem}
.col h3{font-family:var(--sans);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);padding:.2rem .3rem .7rem;display:flex;justify-content:space-between}
.col h3 .c{color:var(--gold-hi)}
.lead{background:var(--panel-2);border:1px solid var(--line);border-radius:.75rem;padding:.7rem .75rem;margin-bottom:.55rem;cursor:pointer;transition:border-color .25s,transform .25s var(--ease)}
.lead:hover{border-color:rgba(212,167,44,.5);transform:translateY(-1px)}
.lead .nm{font-weight:700;color:#fff;display:flex;justify-content:space-between;gap:.4rem}
.lead .meta{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem}
.lead .mv{display:flex;gap:.3rem;margin-top:.5rem}
.lead .mv button{flex:1;background:none;border:1px solid var(--line);border-radius:.4rem;color:var(--mut);font-size:.72rem;padding:.2rem}
.lead .mv button:hover{color:var(--gold-hi);border-color:rgba(212,167,44,.4)}
.searchrow{display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.searchrow input{max-width:20rem}
/* ── CONVERSATIONS ── */
.conv{display:grid;grid-template-columns:19rem 1fr;gap:0;border:1px solid var(--line);border-radius:1rem;overflow:hidden;height:calc(100vh - 8.5rem)}
@media(max-width:52rem){.conv{grid-template-columns:1fr;height:auto}.conv.showthread .convlist{display:none}.conv:not(.showthread) .convthread{display:none}}
.convlist{border-right:1px solid var(--line);overflow-y:auto;background:var(--panel)}
.convitem{padding:.8rem .9rem;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:.6rem;align-items:flex-start}
.convitem:hover{background:var(--panel-2)}
.convitem.on{background:var(--gold-dim);border-left:2px solid var(--gold)}
.convitem .av{width:2.2rem;height:2.2rem;border-radius:50%;background:var(--panel-3);display:grid;place-items:center;font-weight:700;color:var(--gold-hi);flex:none;font-size:.8rem}
.convitem .cbody{flex:1;min-width:0}
.convitem .cn{font-weight:700;color:#fff;display:flex;justify-content:space-between;gap:.3rem}
.convitem .cn .t{font-size:.7rem;color:var(--mut);font-weight:400;flex:none}
.convitem .cprev{font-size:.82rem;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.convitem .unread{width:.5rem;height:.5rem;border-radius:50%;background:var(--gold);flex:none;margin-top:.4rem}
.convthread{display:flex;flex-direction:column;background:var(--bg)}
.threadhead{padding:.8rem 1rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.7rem;background:var(--panel)}
.threadhead .nm{font-weight:700;color:#fff;flex:1}
.msgs{flex:1;overflow-y:auto;padding:1.1rem;display:flex;flex-direction:column;gap:.6rem}
.msg{max-width:72%;padding:.6rem .85rem;border-radius:1rem;font-size:.9rem;line-height:1.45;position:relative}
.msg .mt{font-size:.66rem;opacity:.6;margin-top:.25rem}
.msg.in{align-self:flex-start;background:var(--panel-2);border:1px solid var(--line);border-bottom-left-radius:.3rem}
.msg.out{align-self:flex-end;background:linear-gradient(155deg,rgba(212,167,44,.9),rgba(184,137,28,.85));color:#151004;border-bottom-right-radius:.3rem}
.msg.note{align-self:center;background:none;border:1px dashed var(--line);color:var(--mut);font-size:.78rem;max-width:90%;text-align:center}
.composer{border-top:1px solid var(--line);padding:.7rem;background:var(--panel)}
.composer .tabs{display:flex;gap:.4rem;margin-bottom:.5rem}
.composer .tabs button{font-size:.76rem;padding:.25rem .7rem;border-radius:999px;border:1px solid var(--line);background:none;color:var(--mut)}
.composer .tabs button.on{background:var(--gold-dim);color:var(--gold-hi);border-color:rgba(212,167,44,.35)}
.composer .row{display:flex;gap:.5rem;align-items:flex-end}
.composer textarea{resize:none;min-height:2.6rem;max-height:8rem}
.emptyc{display:grid;place-items:center;height:100%;color:var(--mut);text-align:center;padding:2rem}
/* ── DIALER ── */
.dialwrap{display:grid;grid-template-columns:20rem 1fr;gap:1.2rem}
@media(max-width:60rem){.dialwrap{grid-template-columns:1fr}}
.dialpad{background:var(--panel);border:1px solid var(--line);border-radius:1.2rem;padding:1.3rem;text-align:center}
.dialnum{font-family:var(--serif);font-size:1.8rem;color:#fff;min-height:2.4rem;letter-spacing:.03em;margin-bottom:.3rem;word-break:break-all}
.dialsub{font-size:.8rem;color:var(--mut);min-height:1.1rem;margin-bottom:1rem}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1rem}
.keys button{aspect-ratio:1.4;border-radius:.8rem;background:var(--panel-2);border:1px solid var(--line);font-size:1.3rem;font-weight:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.keys button:hover{border-color:var(--gold)}
.keys button small{font-size:.5rem;color:var(--mut);letter-spacing:.1em}
.dialact{display:flex;gap:.6rem}
.dialcall{flex:1;background:linear-gradient(155deg,#5abd8c,#2e9c68);border:0;color:#04120b;font-weight:800;border-radius:.8rem;min-height:3rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.dialback{width:3rem;border-radius:.8rem;background:var(--panel-2);border:1px solid var(--line)}
.callog .row{display:flex;align-items:center;gap:.7rem;padding:.6rem .3rem;border-bottom:1px solid var(--line)}
.callog .av{width:2rem;height:2rem;border-radius:50%;background:var(--panel-3);display:grid;place-items:center;color:var(--gold-hi);font-weight:700;font-size:.75rem;flex:none}
/* ── AUTOMATIONS ── */
.wf{background:var(--panel);border:1px solid var(--line);border-radius:1rem;padding:1.1rem;margin-bottom:.9rem}
.wf-head{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
.wf-head h3{font-size:1.1rem;color:#fff;flex:1;min-width:12rem}
.toggle{width:2.8rem;height:1.6rem;border-radius:999px;background:var(--panel-3);border:1px solid var(--line);position:relative;flex:none;transition:background .3s}
.toggle::after{content:"";position:absolute;top:.15rem;left:.15rem;width:1.15rem;height:1.15rem;border-radius:50%;background:var(--mut);transition:all .3s var(--ease)}
.toggle.on{background:var(--ok-dim);border-color:var(--ok)}
.toggle.on::after{left:1.3rem;background:var(--ok)}
.wf-flow{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-top:.9rem}
.node{background:var(--panel-2);border:1px solid var(--line);border-radius:.6rem;padding:.4rem .7rem;font-size:.82rem;display:flex;align-items:center;gap:.4rem}
.node.trig{border-color:rgba(212,167,44,.4);color:var(--gold-hi);background:var(--gold-dim)}
.node .x{color:var(--mut2);font-weight:700;cursor:pointer;padding:0 .1rem}
.node .x:hover{color:var(--bad)}
.arrow{color:var(--mut2)}
.wf-add{margin-top:.7rem;display:flex;gap:.5rem;flex-wrap:wrap}
.runlog{max-height:16rem;overflow-y:auto}
.runlog .r{font-size:.82rem;padding:.4rem .3rem;border-bottom:1px solid var(--line);display:flex;gap:.6rem}
.runlog .r .tt{color:var(--mut);flex:none;font-size:.74rem}
/* ── DRAWER / MODAL ── */
.scrim2{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:70;display:none}
.scrim2.show{display:block}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(32rem,100vw);background:var(--panel);border-left:1px solid var(--line);z-index:80;transform:translateX(102%);transition:transform .45s var(--ease);overflow-y:auto;padding:1.3rem}
.drawer.show{transform:none}
.dclose{position:absolute;top:1rem;right:1rem;background:var(--panel-2);border:1px solid var(--line);border-radius:99px;width:2.1rem;height:2.1rem}
.modal{position:fixed;z-index:80;top:50%;left:50%;transform:translate(-50%,-48%);width:min(30rem,94vw);max-height:88vh;overflow-y:auto;background:var(--panel);border:1px solid var(--line);border-radius:1.1rem;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s var(--ease)}
.modal.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%)}
.rowflex{display:flex;gap:.6rem;flex-wrap:wrap}.rowflex>*{flex:1;min-width:8rem}
fieldset{border:1px solid var(--line);border-radius:.7rem;padding:.8rem .9rem;margin-top:.9rem}
legend{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);padding-inline:.4rem}
.toast{position:fixed;left:50%;bottom:1.4rem;transform:translate(-50%,16px);background:#15150f;border:1px solid rgba(212,167,44,.45);color:var(--gold-hi);padding:.65rem 1.2rem;border-radius:999px;font-weight:600;font-size:.85rem;z-index:100;opacity:0;pointer-events:none;transition:all .4s var(--ease);max-width:92vw;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,0)}
.banner{background:var(--gold-dim);border:1px solid rgba(212,167,44,.3);border-radius:.7rem;padding:.6rem 1rem;font-size:.84rem;color:var(--gold-hi);margin-bottom:1rem;display:flex;justify-content:space-between;gap:1rem;align-items:center;flex-wrap:wrap}
.sol-ok{color:var(--ok)}.sol-warn{color:var(--warn)}.sol-bad{color:var(--bad);font-weight:700}
.big-serif{font-family:var(--serif);font-size:3rem;color:var(--gold-hi);line-height:1}

/* lead temperature */
.pill.temp-cold{background:rgba(107,169,232,.15);color:var(--blue)}
.pill.temp-warm{background:rgba(232,179,85,.15);color:var(--warn)}
.pill.temp-contacted{background:var(--ok-dim);color:var(--ok)}
.pill.temp-closed{background:rgba(255,255,255,.06);color:var(--mut)}
/* team dashboard */
.teamgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(9rem,1fr));gap:.9rem;margin-bottom:1.2rem}
.tmtile{background:var(--panel);border:1px solid var(--line);border-radius:1rem;padding:1rem 1.1rem}
.tmtile .big{font-family:var(--serif);font-size:1.9rem;color:var(--gold-hi);line-height:1}
.tmtile .lbl{font-size:.74rem;color:var(--mut);margin-top:.3rem}
.agentrow{display:flex;align-items:center;gap:.7rem;padding:.5rem .2rem;border-bottom:1px solid var(--line)}
.agentrow .av{width:2.1rem;height:2.1rem;border-radius:50%;background:var(--panel-3);display:grid;place-items:center;color:var(--gold-hi);font-weight:700;font-size:.72rem;flex:none}
.agentrow .st{display:flex;gap:1.4rem;margin-inline-start:auto;text-align:center}
.agentrow .st b{display:block;color:#fff;font-family:var(--serif);font-size:1.1rem}
.agentrow .st span{font-size:.64rem;color:var(--mut);text-transform:uppercase;letter-spacing:.08em}

/* recording zone */
.reczone{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin:.7rem 0}
audio{filter:sepia(.2) saturate(.8)}
/* incoming-call ring */
.ringmodal{position:fixed;inset:0;z-index:200;display:grid;place-items:center;background:rgba(6,7,8,.86);backdrop-filter:blur(8px)}
.ringmodal[hidden]{display:none}
.ringcard{text-align:center;padding:2.4rem 2rem;max-width:24rem;width:90%}
.ringpulse{width:8rem;height:8rem;margin:0 auto 1.4rem;border-radius:50%;display:grid;place-items:center;background:var(--gold-dim);animation:ringpulse 1.4s ease-out infinite}
@keyframes ringpulse{0%{box-shadow:0 0 0 0 rgba(212,167,44,.45)}70%{box-shadow:0 0 0 26px rgba(212,167,44,0)}100%{box-shadow:0 0 0 0 rgba(212,167,44,0)}}
.ringav{width:5.4rem;height:5.4rem;border-radius:50%;background:var(--panel-3);display:grid;place-items:center;color:var(--gold-hi);font-weight:700;font-size:1.7rem;font-family:var(--serif)}
.ringlabel{font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-hi)}
.ringcard h2{color:#fff;font-size:1.7rem;margin:.3rem 0}
.ringnum{color:var(--mut);font-variant-numeric:tabular-nums;margin-bottom:1.6rem}
.ringbtns{display:flex;gap:1.2rem;justify-content:center}
.ringbtn{border:0;border-radius:999px;padding:.9rem 1.6rem;font-weight:800;font-size:.95rem;cursor:pointer;font-family:var(--sans)}

async function hash(pw,salt){
  var raw=salt+'::'+pw+'::uclcc';
  try{
    var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(raw));
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  }catch(e){ /* file:// / insecure context fallback */
    var h=5381;for(var i=0;i<raw.length;i++){h=((h<<5)+h+raw.charCodeAt(i))>>>0;}
    return 'fb'+h.toString(16);
  }
}

    if(hh!==acc.hash)return autherr('Incorrect password.');
    startSession(email);
  }
};

/* ══════════ SENDER (webhook-relay → Twilio → copy) ══════════ */
function emit(event,extra){
  var url=(S.settings.webhook||'').trim();
  var payload=Object.assign({event:event,at:now()},extra||{});
  if(!url){S.outbox.push(payload);return;}
  try{fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(function(){S.outbox.push(payload);save();});}
  catch(e){S.outbox.push(payload);}
}
function sendSMS(contact,body,cb){
  var to='+1'+String(contact.phone||'').replace(/\D/g,'').slice(-10);
  var wh=(S.settings.webhook||'').trim();
  emit('sms.request',{to:to,body:body,contact:{id:contact.id,name:contact.name}});
  if(wh){cb&&cb('sent via n8n webhook');return;}
  if(S.settings.twSid&&S.settings.twToken&&S.settings.twFrom){
    try{fetch('https://api.twilio.com/2010-04-01/Accounts/'+encodeURIComponent(S.settings.twSid)+'/Messages.json',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded','Authorization':'Basic '+btoa(S.settings.twSid+':'+S.settings.twToken)},body:'To='+encodeURIComponent(to)+'&From='+encodeURIComponent(S.settings.twFrom)+'&Body='+encodeURIComponent(body)})
      .then(function(r){cb&&cb(r.ok?'sent via Twilio':'Twilio error '+r.status);}).catch(function(){cb&&cb('blocked — copied');copy(body);});}
    catch(e){cb&&cb('copied');copy(body);}
    return;
  }
  copy(body); cb&&cb('copied (no sender configured)');
}
function copy(t){if(navigator.clipboard)navigator.clipboard.writeText(t).catch(function(){});}

  review:function(c){return 'Thank you for trusting United Citizen Law, '+first(c)+'. If you have 60 seconds, a Google review helps other families find us: '+(S.settings.reviewLink||'[review link]');},
  consult:function(c){return 'Hi '+first(c)+', a friendly reminder about your free consultation with United Citizen Law. Reply here if you need to reschedule — no problem at all.';}

/* ══════════ AUTOMATION ENGINE ══════════ */
function fireTrigger(type,contact,extra){
  S.workflows.forEach(function(wf){
    if(!wf.active||wf.trigger.type!==type)return;
    if(type==='stage_changed'&&wf.trigger.stage&&wf.trigger.stage!==(extra&&extra.stage))return;
    if(wf.channel==='make'){ fireMake(wf,contact); } else { enroll(wf,contact); }
  });
}
function enroll(wf,contact){
  var en={id:uid(),wf:wf.id,contactId:contact.id,step:0,nextAt:Date.now()};
  S.enrollments.push(en);
  runLog(wf.name+' → enrolled '+contact.name);
  processEnrollment(en);
}
function processEnrollment(en){
  var wf=S.workflows.find(function(w){return w.id===en.wf;});
  var c=S.contacts.find(function(x){return x.id===en.contactId;});
  if(!wf||!c){removeEnroll(en);return;}
  while(en.step<wf.actions.length){
    var a=wf.actions[en.step];
    if(a.type==='wait'){
      en.nextAt=Date.now()+(a.mins||1)*60000;
      en.step++; save(); return; /* resume later */
    }
    doAction(a,c,wf);
    en.step++;
  }
  removeEnroll(en); save();
}
function doAction(a,c,wf){
  if(a.type==='send_sms'){var body=(TPL[a.tpl]||TPL.instant)(c);threadPush(c.id,{t:now(),dir:'out',ch:'sms',body:body,auto:wf.name});sendSMS(c,body);runLog(wf.name+' → SMS to '+c.name);}
  else if(a.type==='send_email'){runLog(wf.name+' → email queued to '+c.name);emit('email.request',{to:c.email,contact:{id:c.id,name:c.name}});}
  else if(a.type==='notify_team'){runLog(wf.name+' → team notified re '+c.name+(c.hot?' (HOT — Sam paged)':''));emit('team.notify',{contact:{id:c.id,name:c.name,hot:c.hot}});}
  else if(a.type==='create_task'){S.tasks.push({id:uid(),title:(a.title||'Follow up')+' — '+c.name,due:iso(Date.now()+864e5),owner:'',done:false});runLog(wf.name+' → task created for '+c.name);}
  else if(a.type==='move_stage'){var i=STAGES.indexOf(a.stage);if(i>-1){c.stage=a.stage;runLog(wf.name+' → moved '+c.name+' to '+a.stage);}}
  else if(a.type==='add_tag'){c.tags=c.tags||[];if(c.tags.indexOf(a.tag)<0)c.tags.push(a.tag);runLog(wf.name+' → tagged '+c.name+' "'+a.tag+'"');}
  else if(a.type==='webhook'){emit('workflow.webhook',{contact:{id:c.id,name:c.name},workflow:wf.name});runLog(wf.name+' → webhook fired for '+c.name);}
}
function runLog(txt){S.runlog.unshift({t:now(),txt:txt});S.runlog=S.runlog.slice(0,120);}
function removeEnroll(en){S.enrollments=S.enrollments.filter(function(x){return x.id!==en.id;});}
function tickEnrollments(){
  if(!S)return; /* pre-login interval guard */
  var due=S.enrollments.filter(function(e){return e.nextAt<=Date.now();});
  if(!due.length)return;
  due.forEach(processEnrollment);
  save();
  if(curView==='auto')renderAuto();
  if(curView==='conv')renderConv();
  updateBadges();
}
setInterval(tickEnrollments,4000);
setInterval(pollInbound,6000);
setInterval(eodScheduler,60000);

/* ── DASHBOARD ── */
function renderDash(C){
  var wk=Date.now()-7*864e5;
  var newWk=S.contacts.filter(function(l){return new Date(l.createdAt)>wk;}).length;
  var resp=S.contacts.filter(function(l){return l.firstResponseAt;}).slice(-30).map(function(l){return(new Date(l.firstResponseAt)-new Date(l.createdAt))/6e4;});
  var med=median(resp);
  var signed=S.contacts.filter(function(l){return l.stage==='Signed';}).length;
  var decided=S.contacts.filter(function(l){return l.stage==='Signed'||l.stage==='Declined';}).length;
  var gRev=S.reviews.filter(function(r){return r.platform==='Google';}).map(function(r){return new Date(r.date);});
  var ds=gRev.length?Math.floor((Date.now()-Math.max.apply(null,gRev))/864e5):null;
  var solSoon=S.contacts.filter(function(l){return l.stage==='Signed'&&solDays(l)!=null&&solDays(l)<=90;}).length;
  var activeWf=S.workflows.filter(function(w){return w.active;}).length;
  var tiles=[
    {b:newWk,l:'new leads · 7 days'},
    {b:med==null?'—':(med<60?Math.round(med)+'m':Math.round(med/60)+'h'),l:'median speed-to-lead',alarm:med!=null&&med>5},
    {b:decided?Math.round(signed/decided*100)+'%':'—',l:'lead → signed'},
    {b:ds==null?'—':ds,l:'days since Google review',alarm:ds!=null&&ds>=14},
    {b:solSoon,l:'SOL ≤ 90 days',alarm:solSoon>0},
    {b:activeWf,l:'automations live'}
  ];
  var att=[];
  S.contacts.forEach(function(l){
    if(l.stage==='New'&&!l.firstResponseAt)att.push({p:1,txt:'⏱ '+l.name+' ('+l.caseType+') not yet contacted — '+ago(l.createdAt)+' ago',id:l.id});
    if(l.hot&&l.stage!=='Signed'&&l.stage!=='Declined')att.push({p:0,txt:'🔥 HOT: '+l.name+' — Sam paged per protocol',id:l.id});
    var d=solDays(l);if(l.stage==='Signed'&&d!=null&&d<=90)att.push({p:0,txt:'⚖️ SOL: '+l.name+' — '+d+' days to file',id:l.id});
  });
  if(ds!=null&&ds>=14)att.push({p:2,txt:'⭐ '+ds+' days without a Google review — ask a happy client today'});
  att.sort(function(a,b){return a.p-b.p;});
  C.innerHTML=
    (S.demo?'<div class="banner"><span>Demo firm loaded — sample contacts, conversations & live automations. Clear it when you go live.</span><button class="btn sm" id="cleardemo">Clear demo data</button></div>':'')+
    '<div class="tiles">'+tiles.map(function(t){return '<div class="tile'+(t.alarm?' alarm':'')+'"><span class="big num">'+esc(t.b)+'</span><div class="lbl">'+esc(t.l)+'</div></div>';}).join('')+'</div>'+
    '<div class="two-col"><div class="card"><h3 style="font-family:var(--sans);font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin-bottom:.8rem">Needs attention</h3>'+
      (att.length?att.slice(0,8).map(function(a){return '<div class="note"'+(a.id?' data-open="'+a.id+'" style="cursor:pointer"':'')+'>'+esc(a.txt)+'</div>';}).join(''):'<p class="muted small">Nothing urgent. Well run.</p>')+'</div>'+
    '<div class="card"><h3 style="font-family:var(--sans);font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin-bottom:.8rem">Automation activity</h3>'+
      (S.runlog.length?S.runlog.slice(0,9).map(function(r){return '<div class="note small"><span class="muted">'+ago(r.t)+'</span> — '+esc(r.txt)+'</div>';}).join(''):'<p class="muted small">Automations will log here as they run.</p>')+'</div></div>';
  var cd=$('#cleardemo');if(cd)cd.onclick=clearDemo;
}
function clearDemo(){
  S.contacts=S.contacts.filter(function(c){return !c.demo;});S.threads={};S.calls=[];S.appts=[];S.reviews=S.reviews.filter(function(r){return !r.demo;});S.tasks=[];S.demo=false;S.runlog=[];S.enrollments=[];log('Demo data cleared — live.');save();render();toast('Demo data cleared');

    '<div class="card"><h3 style="font-family:var(--sans);font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin-bottom:.8rem">Upcoming</h3><div class="twrap"><table><thead><tr><th>When</th><th>Client</th><th>Type</th><th></th></tr></thead><tbody>'+
    (up.length?up.map(function(a){var d=new Date(a.t);return '<tr><td class="num">'+d.toLocaleString([], {weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})+'</td><td><b>'+esc(a.name)+'</b></td><td>'+esc(a.type)+'</td><td><button class="btn sm" data-delap="'+a.id+'">Remove</button></td></tr>';}).join(''):'<tr><td colspan="4" class="muted">No appointments yet.</td></tr>')+'</tbody></table></div></div>';

/* ── AUTOMATIONS ── */
var ACTION_LABELS={send_sms:'Send SMS',send_email:'Send email',wait:'Wait',create_task:'Create task',move_stage:'Move stage',add_tag:'Add tag',notify_team:'Notify team',webhook:'Webhook',eod_slack:'Send EOD to Slack'};
var TRIG_LABELS={lead_created:'New lead created',stage_changed:'Stage changed',appointment_booked:'Appointment booked',eod_midnight:'Every night at midnight',call_logged:'Call logged',review_received:'Review received'};
function renderAuto(C){
  if(C){C.innerHTML='<div style="display:flex;gap:.7rem;margin-bottom:1rem;flex-wrap:wrap"><button class="btn gold" id="newwf">+ New workflow</button><span class="muted small" style="align-self:center">Workflows run automatically when their trigger fires — SMS, tasks, tagging, stage moves, waits, and webhooks all execute live.</span></div><div id="wflist"></div><div class="card" style="margin-top:1rem"><h3 style="font-family:var(--sans);font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin-bottom:.6rem">Run log</h3><div class="runlog" id="runlog"></div></div>';}
  var L=$('#wflist'); if(!L)return;
  L.innerHTML=S.workflows.map(function(wf){
    var flow='<div class="node trig">⚡ '+esc(TRIG_LABELS[wf.trigger.type]||wf.trigger.type)+(wf.trigger.stage?' ('+esc(wf.trigger.stage)+')':'')+'</div>';
    wf.actions.forEach(function(a,idx){
      var label=ACTION_LABELS[a.type]+(a.type==='send_sms'?' ('+(a.tpl||'')+')':a.type==='wait'?' '+a.mins+'m':a.type==='move_stage'?' → '+a.stage:a.type==='add_tag'?' "'+a.tag+'"':a.type==='create_task'?': '+(a.title||'').slice(0,20):'');
      flow+='<span class="arrow">→</span><div class="node">'+esc(label)+' <span class="x" data-delact="'+wf.id+':'+idx+'">✕</span></div>';
    });
    return '<div class="wf"><div class="wf-head"><h3>'+esc(wf.name)+'</h3><span class="pill">'+(wf.channel==='make'?'make.com':'in-CRM')+'</span><span class="pill '+(wf.active?'ok':'')+'">'+(wf.active?'LIVE':'paused')+'</span><button class="toggle'+(wf.active?' on':'')+'" data-toggle="'+wf.id+'" aria-label="Toggle"></button><button class="btn sm danger" data-delwf="'+wf.id+'">Delete</button></div><div class="wf-flow">'+flow+'</div><div class="wf-add"><button class="btn sm" data-addact="'+wf.id+'">+ Add action</button><button class="btn sm ghost" data-testwf="'+wf.id+'">▶ Test run</button></div></div>';
  }).join('')||'<p class="muted">No workflows yet. Create your first automation.</p>';
  $('#runlog').innerHTML=S.runlog.slice(0,40).map(function(r){return '<div class="r"><span class="tt">'+ago(r.t)+'</span><span>'+esc(r.txt)+'</span></div>';}).join('')||'<p class="muted small">Nothing has run yet. Trigger a workflow or use “Test run”.</p>';
  var nw=$('#newwf');if(nw)nw.onclick=newWorkflow;
  $$('[data-toggle]').forEach(function(b){b.onclick=function(){var wf=S.workflows.find(function(w){return w.id===b.dataset.toggle;});wf.active=!wf.active;log('Workflow '+(wf.active?'activated':'paused')+': '+wf.name);save();renderAuto();};});
  $$('[data-delwf]').forEach(function(b){b.onclick=function(){if(confirm('Delete this workflow?')){S.workflows=S.workflows.filter(function(w){return w.id!==b.dataset.delwf;});save();renderAuto();}};});
  $$('[data-delact]').forEach(function(b){b.onclick=function(){var p=b.dataset.delact.split(':');var wf=S.workflows.find(function(w){return w.id===p[0];});wf.actions.splice(+p[1],1);save();renderAuto();};});
  $$('[data-addact]').forEach(function(b){b.onclick=function(){addActionModal(b.dataset.addact);};});
  $$('[data-testwf]').forEach(function(b){b.onclick=function(){var wf=S.workflows.find(function(w){return w.id===b.dataset.testwf;});var c=S.contacts[0];if(!c){toast('Add a contact first');return;}enroll(wf,c);save();renderAuto();toast('Test run started for '+c.name);};});
}
function newWorkflow(){
  openModal('<h2 style="font-size:1.3rem;margin-bottom:1rem">New workflow</h2><label for="wf-name">Name</label><input id="wf-name" placeholder="e.g., Consult reminder"><label for="wf-chan">Where it runs</label><select id="wf-chan"><option value="crm">Command Center — contact &amp; call actions (SMS, tasks, tags)</option><option value="make">make.com — everything else (records, sheets, ops)</option></select><label for="wf-trig">When this happens (trigger)</label><select id="wf-trig"><option value="lead_created">New lead created</option><option value="stage_changed">Stage changed</option><option value="appointment_booked">Appointment booked</option></select><div id="wf-stagewrap" class="hidden"><label for="wf-stage">…to stage</label><select id="wf-stage">'+STAGES.map(function(s){return '<option>'+s+'</option>';}).join('')+'</select></div><div class="rowflex" style="margin-top:1.2rem"><button class="btn gold" id="wf-create">Create</button><button class="btn ghost" id="wf-cancel">Cancel</button></div>');
  $('#wf-trig').onchange=function(){$('#wf-stagewrap').classList.toggle('hidden',this.value!=='stage_changed');};
  $('#wf-create').onclick=function(){var nm=$('#wf-name').value.trim();if(!nm){toast('Name it first');return;}var tr={type:$('#wf-trig').value};if(tr.type==='stage_changed')tr.stage=$('#wf-stage').value;S.workflows.push({id:uid(),name:nm,channel:$('#wf-chan').value,active:false,trigger:tr,actions:[]});log('Workflow created: '+nm);save();closeModal();renderAuto();toast('Workflow created — add actions, then flip it live');};
  $('#wf-cancel').onclick=closeModal;
}
function addActionModal(wfId){
  openModal('<h2 style="font-size:1.3rem;margin-bottom:1rem">Add action</h2><label for="ac-type">Action</label><select id="ac-type">'+Object.keys(ACTION_LABELS).map(function(k){return '<option value="'+k+'">'+ACTION_LABELS[k]+'</option>';}).join('')+'</select><div id="ac-param"></div><div class="rowflex" style="margin-top:1.2rem"><button class="btn gold" id="ac-add">Add</button><button class="btn ghost" id="ac-cancel">Cancel</button></div>');
  function drawParam(){var t=$('#ac-type').value,h='';
    if(t==='send_sms')h='<label>Message template</label><select id="ac-tpl"><option value="instant">Instant reply</option><option value="nudge">Follow-up nudge</option><option value="review">Review request</option><option value="consult">Consult reminder</option></select>';
    else if(t==='wait')h='<label>Wait how many minutes?</label><input id="ac-mins" type="number" value="3" min="1">';
    else if(t==='move_stage')h='<label>Move to stage</label><select id="ac-stage">'+STAGES.map(function(s){return '<option>'+s+'</option>';}).join('')+'</select>';
    else if(t==='add_tag')h='<label>Tag</label><input id="ac-tag" placeholder="e.g., vip">';
    else if(t==='create_task')h='<label>Task title</label><input id="ac-title" placeholder="e.g., Call within 5 minutes">';
    $('#ac-param').innerHTML=h;}
  $('#ac-type').onchange=drawParam;drawParam();
  $('#ac-add').onclick=function(){var t=$('#ac-type').value,a={type:t};
    if(t==='send_sms')a.tpl=$('#ac-tpl').value;else if(t==='wait')a.mins=+$('#ac-mins').value||1;else if(t==='move_stage')a.stage=$('#ac-stage').value;else if(t==='add_tag')a.tag=$('#ac-tag').value.trim()||'tag';else if(t==='create_task')a.title=$('#ac-title').value.trim()||'Follow up';
    S.workflows.find(function(w){return w.id===wfId;}).actions.push(a);save();closeModal();renderAuto();};
  $('#ac-cancel').onclick=closeModal;
}

    S.reviews.slice().sort(function(a,b){return b.date.localeCompare(a.date);}).map(function(r){return '<tr><td class="num">'+esc(r.date)+'</td><td>'+esc(r.platform)+'</td><td class="num">'+'★'.repeat(r.stars)+'</td><td>'+esc(r.name)+'</td><td>'+(r.responded?'<span class="pill ok">yes</span>':'<button class="btn sm" data-rvrep="'+r.id+'">Mark</button>')+'</td></tr>';}).join('')+'</tbody></table></div></div>';

  var st=S.settings;
  C.innerHTML='<div class="two-col"><div class="card"><h3 style="color:#fff;font-size:1.05rem;margin-bottom:.3rem">Team &amp; routing</h3><label>Intake team (comma-separated)</label><input id="s-team" value="'+esc(st.team)+'"><label>Hot-case protocol</label><textarea id="s-proto" rows="2">'+esc(st.protocol)+'</textarea><label>Google review link</label><input id="s-rev" value="'+esc(st.reviewLink)+'"><button class="btn gold" id="s-save" style="margin-top:1rem">Save</button></div>'+
    '<div class="card"><h3 style="color:#fff;font-size:1.05rem;margin-bottom:.3rem">Connections</h3><p class="muted small">Contact &amp; call automations run inside Command Center. Everything else runs in make.com — toggle each on the Automations page. If make.com is unreachable, Command Center queues a fallback.</p><label>Active agent (whoever is at this desk)</label><select id="s-agent">'+agentOpts(st.agent)+'</select><label>make.com webhook URL (non-contact automations)</label><input id="s-make" value="'+esc(st.makeWebhook||'')+'" placeholder="https://hook.make.com/xxxxxxxx"><label>Slack webhook URL (midnight EOD reports)</label><input id="s-slack" value="'+esc(st.slackWebhook||'')+'" placeholder="https://hooks.slack.com/services/..."><label>n8n / relay webhook URL (SMS send + inbound relay)</label><input id="s-wh" value="'+esc(st.webhook)+'" placeholder="https://your-n8n/webhook/ucl"><label>Inbound-call poll URL (rings the CRM on incoming calls)</label><input id="s-inpoll" value="'+esc(st.inboundPoll||'')+'" placeholder="https://your-relay/inbound-latest"><fieldset><legend>Twilio (optional)</legend><div class="rowflex"><div><label>Account SID</label><input id="s-sid" value="'+esc(st.twSid)+'" placeholder="AC…"></div><div><label>Auth token</label><input id="s-tok" type="password" value="'+esc(st.twToken)+'"></div><div><label>From number</label><input id="s-from" value="'+esc(st.twFrom)+'" placeholder="+1916…"></div></div></fieldset><div class="rowflex" style="margin-top:.8rem"><button class="btn" id="s-test">Send test event</button><button class="btn" id="s-eodnow">Send EOD to Slack now</button></div></div></div>'+
    '<div class="card" style="margin-top:1rem"><h3 style="color:#fff;font-size:1.05rem;margin-bottom:.5rem">Data</h3><div class="rowflex"><button class="btn" id="s-exp">Export backup (JSON)</button><button class="btn" id="s-expcsv">Export contacts (CSV)</button><label class="btn" style="text-align:center;cursor:pointer">Import CSV<input id="s-imp" type="file" accept=".csv" style="display:none"></label><button class="btn danger" id="s-wipe">Erase all data</button></div><p class="muted small" style="margin-top:.6rem">Account: <b>'+esc(EMAIL)+'</b> · data is stored privately in this browser under your login. Export weekly; host the file for multi-device sync.</p></div>';

  $('#s-wipe').onclick=function(){if(confirm('Erase ALL data for '+EMAIL+'? Export a backup first!')&&confirm('Really erase everything?')){S.contacts=[];S.threads={};S.calls=[];S.appts=[];S.reviews=[];S.tasks=[];S.runlog=[];S.enrollments=[];S.demo=false;log('All data erased');save();render();toast('Erased');}};

function dl(name,text,type){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:type}));a.download=name;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},400);}
function csvCell(v){v=String(v==null?'':v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function exportCSV(){var head=['name','phone','email','caseType','language','source','stage','accidentDate','hot'];var rows=S.contacts.map(function(c){return [c.name,c.phone,c.email||'',c.caseType,c.language,c.source,c.stage,c.accidentDate||'',c.hot?'yes':''].map(csvCell).join(',');});dl('ucl-contacts.csv',head.join(',')+'\n'+rows.join('\n'),'text/csv');}
function importCSV(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){var lines=String(rd.result).split(/\r?\n/).filter(Boolean);if(lines.length<2){toast('Empty CSV');return;}var head=lines[0].split(',').map(function(h){return h.trim().toLowerCase();});var ni=head.indexOf('name'),pi=head.indexOf('phone');if(ni<0||pi<0){toast('CSV needs name and phone columns');return;}var add=0;lines.slice(1).forEach(function(ln){var cols=ln.split(',');var nm=(cols[ni]||'').trim();if(!nm)return;S.contacts.push({id:uid(),createdAt:now(),name:nm,phone:(cols[pi]||'').replace(/\D/g,''),email:head.indexOf('email')>-1?(cols[head.indexOf('email')]||'').trim():'',caseType:head.indexOf('casetype')>-1?cols[head.indexOf('casetype')]:'Something else',language:head.indexOf('language')>-1?cols[head.indexOf('language')]:'English',source:'Import',stage:'New',hot:false,accidentDate:null,govClaim:false,tags:[],notes:[],firstResponseAt:null,assignedTo:''});add++;});log('Imported '+add+' contacts');save();render();toast('Imported '+add+' contacts');};rd.readAsText(f);}

/* ── SOL helpers ── */
function solDate(l){if(!l.accidentDate)return null;var d=new Date(l.accidentDate+'T12:00:00');if(l.govClaim)d.setMonth(d.getMonth()+6);else d.setFullYear(d.getFullYear()+2);return d;}
function solDays(l){var d=solDate(l);return d?Math.floor((d-Date.now())/864e5):null;}
function solCls(d){return d==null?'':d<=90?'sol-bad':d<=180?'sol-warn':'sol-ok';}

    '<div style="margin-top:.6rem">'+(l.notes||[]).slice().reverse().map(function(n){return '<div class="note small">'+esc(n.txt)+'<div class="muted" style="font-size:.72rem">'+ago(n.t)+' ago</div></div>';}).join('')+'</div>'+
    '<div class="rowflex" style="margin-top:1rem"><button class="btn gold" id="d-save">Save changes</button><button class="btn danger" id="d-del">Delete</button></div>';
  $('#scrim2').classList.add('show');$('#drawer').classList.add('show');
  var rp=$('#d-resp');if(rp)rp.onclick=function(){l.firstResponseAt=now();log('Contacted '+l.name);save();openContact(id);drawBoardIf();};

    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      recState.chunks=[];var mr=new MediaRecorder(stream);recState.rec=mr;
      mr.ondataavailable=function(e){if(e.data.size)recState.chunks.push(e.data);};
      mr.onstop=function(){var blob=new Blob(recState.chunks,{type:'audio/webm'});var fr=new FileReader();fr.onload=function(){recState.data=fr.result;st.textContent='Recording saved ('+Math.round(blob.size/1024)+' KB)';};fr.readAsDataURL(blob);stream.getTracks().forEach(function(t){t.stop();});btn.textContent='\u{1F534} Record call';};
      mr.start();btn.textContent='\u23F9 Stop recording';st.textContent='Recording\u2026';
    }).catch(function(){st.textContent='Mic blocked — use the Twilio URL field for live calls.';});

  try{
    if(on){
      if(!ring.ctx)ring.ctx=new (window.AudioContext||window.webkitAudioContext)();
      var ctx=ring.ctx; if(ctx.state==='suspended')ctx.resume();
      function beep(){ [480,620].forEach(function(f,i){ var o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;o.connect(g);g.connect(ctx.destination);var t=ctx.currentTime+i*.4;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.09,t+.04);g.gain.exponentialRampToValueAtTime(.0001,t+.35);o.start(t);o.stop(t+.4);});}
      beep(); ring.beat=setInterval(beep,2200);
    } else { clearInterval(ring.beat); ring.beat=null; }

}

  var slack=(S.settings.slackWebhook||'').trim(), make=(S.settings.makeWebhook||'').trim(), m=msgs[i];
  var next=function(){ setTimeout(function(){ postSlackSeq(msgs,i+1,manual); }, 500); };

/* ── 1. FIRM GATE ── */
function needGate(){ try{return sessionStorage.getItem('uclcc_gate_ok')!=='1';}catch(e){return true;} }
function showGate(){
  var g=document.createElement('div');g.id='uclgate';
  g.innerHTML='<div class="card"><div class="lock"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="10" width="16" height="10" rx="2.2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div>'
    +'<h1>UCL Command Center</h1><p>Enter the firm access code to continue.</p>'
    +'<input id="uclgate-in" type="password" autocomplete="off" placeholder="Access code" aria-label="Firm access code">'
    +'<button id="uclgate-go">Unlock</button><div class="err" id="uclgate-err"></div></div>';
  document.body.appendChild(g);
  var tries=0;
  async function attempt(){
    var v=$('#uclgate-in').value.trim(); if(!v)return;
    var h='';try{h=await sha256(v);}catch(e){}
    if(h===GATE_HASH){ try{sessionStorage.setItem('uclcc_gate_ok','1');sessionStorage.setItem('uclcc_gate_code',v);}catch(e){}
      g.remove(); return; }
    tries++; $('#uclgate-err').textContent='Wrong code'+(tries>2?' — ask Sam or Sayed for the current firm code.':'.');
    $('#uclgate-in').value='';
  }
  $('#uclgate-go').onclick=attempt;
  $('#uclgate-in').addEventListener('keydown',function(e){if(e.key==='Enter')attempt();});
  setTimeout(function(){$('#uclgate-in').focus();},50);
}
if(needGate()) showGate();

/* ── 2. CLOUD AUTH (replaces the local-only handler; demo stays local) ── */
function localAcctStub(email){
  try{
    var A=JSON.parse(localStorage.getItem('uclcc_accounts'))||{};
    if(!A[email]){A[email]={firm:'United Citizen Law',salt:'cloud',hash:'cloud-managed',createdAt:Date.now()};localStorage.setItem('uclcc_accounts',JSON.stringify(A));}
  }catch(e){}
}
function authErr(m){var e=$('#auth-err');if(e){e.textContent=m;e.classList.add('show');}}
var submitBtn=$('#auth-submit');
if(submitBtn&&sb){
  submitBtn.onclick=async function(){
    var email=($('#au-email').value||'').trim().toLowerCase(), pw=$('#au-pass').value;
    if(!email||!/.+@.+\..+/.test(email))return authErr('Enter a valid email.');
    var signup=!$('#confirm-wrap').classList.contains('hidden');
    /* demo short-circuit: keep the sample workspace fully local */
    if(email==='demo@uclaw.net'){ 
      submitBtn.textContent='One sec…';
      try{
        var A=JSON.parse(localStorage.getItem('uclcc_accounts'))||{};
        if(!A[email]){A[email]={firm:'United Citizen Law',salt:'demo',hash:'demo',createdAt:Date.now()};localStorage.setItem('uclcc_accounts',JSON.stringify(A));}
        localStorage.setItem('uclcc_session',email);
      }catch(e){}
      location.reload(); return;
    }
    if(pw.length<8)return authErr('Password must be at least 8 characters.');
    submitBtn.disabled=true;submitBtn.textContent=signup?'Creating…':'Signing in…';
    try{
      if(signup){
        if(pw!==$('#au-pass2').value){authErr('Passwords do not match.');return;}
        var gate='';try{gate=sessionStorage.getItem('uclcc_gate_code')||'';}catch(e){}
        var r=await fetch(SB_URL+'/functions/v1/team-provision',{method:'POST',
          headers:{'Content-Type':'application/json',apikey:SB_KEY,Authorization:'Bearer '+SB_KEY},
          body:JSON.stringify({gate:gate,email:email,password:pw,full_name:($('#au-firm').value||'').trim()})});
        var j=await r.json();
        if(!j.ok){authErr(j.error||'Could not create the account.');return;}
      }
      var res=await sb.auth.signInWithPassword({email:email,password:pw});
      if(res.error){authErr(signup?res.error.message:'Wrong email or password (accounts are cloud-managed now).');return;}
      localAcctStub(email);
      try{localStorage.setItem('uclcc_session',email);}catch(e){}
      /* pull newest cloud copy before first paint */
      try{
        var q=await sb.from('crm_state').select('data,updated_at').eq('email',email).maybeSingle();
        if(q.data&&q.data.data&&Object.keys(q.data.data).length){
          localStorage.setItem('uclcc_data_'+email,JSON.stringify(q.data.data));
          try{sessionStorage.setItem('uclcc_cloud_at',q.data.updated_at);}catch(e){}
        }
      }catch(e){}
      location.reload();
    }finally{ submitBtn.disabled=false; submitBtn.textContent=signup?'Create account':'Sign in'; }
  };
}

/* ── 3. CLOUD SYNC (patch localStorage writes; debounce upsert) ── */
var syncT=null, syncBadge=null, CUR={email:null,uid:null,role:null};
function badge(txt){
  if(!syncBadge){syncBadge=document.createElement('div');syncBadge.className='ucl-sync';document.body.appendChild(syncBadge);}
  syncBadge.style.display='block';syncBadge.textContent=txt;
  clearTimeout(badge._t);badge._t=setTimeout(function(){syncBadge.style.display='none';},2200);
}
function pushState(email){
  if(!sb||!CUR.uid||email!==CUR.email)return;
  clearTimeout(syncT);
  syncT=setTimeout(async function(){
    try{
      var raw=localStorage.getItem('uclcc_data_'+email); if(!raw)return;
      var data=JSON.parse(raw);
      var r=await sb.from('crm_state').upsert({user_id:CUR.uid,email:email,data:data,updated_at:new Date().toISOString()});
      badge(r.error?'⚠ sync failed':'☁ synced');
    }catch(e){badge('⚠ sync failed');}
  },2500);
}
var _set=localStorage.setItem.bind(localStorage);
localStorage.setItem=function(k,v){
  _set(k,v);
  if(typeof k==='string'&&k.indexOf('uclcc_data_')===0){ pushState(k.slice('uclcc_data_'.length)); }
};

/* ── 4. SESSION INIT + COMMAND HQ ── */
async function init(){
  if(!sb)return;
  var sess=(await sb.auth.getSession()).data.session;
  var localEmail=null;try{localEmail=localStorage.getItem('uclcc_session');}catch(e){}
  if(!sess||!localEmail||localEmail==='demo@uclaw.net')return;
  if((sess.user.email||'').toLowerCase()!==localEmail.toLowerCase())return;
  CUR.email=localEmail;CUR.uid=sess.user.id;
  try{
    var p=await sb.from('profiles').select('role,full_name,title').eq('user_id',CUR.uid).maybeSingle();
    CUR.role=p.data?p.data.role:'member';
  }catch(e){CUR.role='member';}
  try{await sb.from('activities').insert({user_id:CUR.uid,email:CUR.email,type:'login',detail:{ua:navigator.userAgent.slice(0,80)}});}catch(e){}
  /* newer cloud copy? adopt once per tab */
  try{
    var q=await sb.from('crm_state').select('data,updated_at').eq('user_id',CUR.uid).maybeSingle();
    var seen=sessionStorage.getItem('uclcc_cloud_at')||'';
    if(q.data&&q.data.updated_at&&q.data.updated_at!==seen){
      var localRaw=localStorage.getItem('uclcc_data_'+CUR.email);
      var cloudRaw=JSON.stringify(q.data.data||{});
      sessionStorage.setItem('uclcc_cloud_at',q.data.updated_at);
      if(cloudRaw.length>20&&cloudRaw!==localRaw){ _set('uclcc_data_'+CUR.email,cloudRaw); location.reload(); return; }
    }
  }catch(e){}
  buildHQ();
  badge('☁ connected as '+CUR.email+(CUR.role==='admin'?' (admin)':''));
  /* first sync if cloud row missing */
  pushState(CUR.email);
  /* website chat leads flow straight into the pipeline */
  autoImportBoot();
}

function hqBtn(){
  var b=document.createElement('button');b.id='uclhq-btn';
  b.textContent=CUR.role==='admin'?'🛰 Command HQ':'🌐 Website leads';
  b.onclick=openHQ;document.body.appendChild(b);b.style.display='block';
}
function buildHQ(){
  var o=document.createElement('div');o.id='uclhq';
  o.innerHTML='<div class="panel"><button class="x" aria-label="Close">✕</button>'
    +'<h2>'+(CUR.role==='admin'?'Command HQ':'Website activity')+'</h2>'
    +'<div class="sub">'+(CUR.role==='admin'?'Live view of the whole firm — every teammate, every website lead.':'Live website leads and appointment requests from uclaw.net.')+'</div>'
    +'<div id="uclhq-body">Loading…</div></div>';
  document.body.appendChild(o);
  o.querySelector('.x').onclick=function(){o.style.display='none';};
  o.addEventListener('click',function(e){if(e.target===o)o.style.display='none';});
  hqBtn();
}
async function openHQ(){
  var o=$('#uclhq');o.style.display='flex';
  var body=$('#uclhq-body');body.innerHTML='Loading…';
  var html='';
  try{
    if(CUR.role==='admin'){
      var profs=(await sb.from('profiles').select('user_id,email,full_name,title,role')).data||[];
      var states=(await sb.from('crm_state').select('user_id,email,data,updated_at')).data||[];
      var today=new Date();today.setHours(0,0,0,0);var t0=today.getTime();
      html+='<h3>Team — live oversight</h3><div class="grid">';
      if(!profs.length)html+='<div class="empty">No team accounts yet — share the access code UCLAW2026 and have everyone create their account.</div>';
      profs.forEach(function(p){
        var stt=null;states.forEach(function(s){if(s.user_id===p.user_id)stt=s;});
        var d=stt&&stt.data?stt.data:null;
        var contacts=d&&d.contacts?d.contacts.length:0;
        var convos=0,msgs=0,calls=0;
        if(d&&d.threads){Object.keys(d.threads).forEach(function(k){var th=d.threads[k]||[];if(th.length)convos++;th.forEach(function(m){if(m.t>=t0&&m.dir!=='note')msgs++;});});}
        if(d&&d.calls){d.calls.forEach(function(c){if(c.t>=t0)calls++;});}
        var last=stt?new Date(stt.updated_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'never';
        html+='<div class="mem"><b>'+esc(p.full_name||p.email)+'</b><span class="role">'+esc(p.title||p.role)+'</span>'
          +'<div class="st"><span>👥 <b>'+contacts+'</b> contacts</span><span>💬 <b>'+convos+'</b> convos</span><span>✉️ <b>'+msgs+'</b> msgs today</span><span>📞 <b>'+calls+'</b> calls today</span></div>'
          +'<div class="st"><span>Last sync: '+esc(last)+'</span></div></div>';
      });
      html+='</div>';
    }
    var leads=(await sb.from('chat_leads').select('*').order('created_at',{ascending:false}).limit(25)).data||[];
    var appts=(await sb.from('appointments').select('*').order('created_at',{ascending:false}).limit(25)).data||[];
    var notifs=(await sb.from('notifications').select('*').eq('status','queued').order('created_at',{ascending:false}).limit(15)).data||[];
    html+='<h3 style="display:flex;align-items:center;gap: .6rem">Website chat leads'+(leads.length?'<button class="imp" id="uclhq-import">Import new into my contacts</button>':'')+'</h3>';
    if(!leads.length)html+='<div class="empty">No website leads yet — they appear here the moment someone finishes the chat.</div>';
    leads.forEach(function(l){html+='<div class="row"><b>'+esc(l.name||'—')+'</b><span>'+esc(l.phone||'')+'</span><span>'+esc(l.case_type||'')+'</span><span class="tag'+(l.status==='new'?'':' q')+'">'+esc(l.status)+'</span><span style="margin-left:auto;color:#77715f">'+new Date(l.created_at).toLocaleString()+'</span></div>';});
    html+='<h3>Appointment requests</h3>';
    if(!appts.length)html+='<div class="empty">No appointment requests yet.</div>';
    appts.forEach(function(a){html+='<div class="row"><b>'+esc(a.name||'—')+'</b><span>'+esc(a.phone||'')+'</span><span>'+esc(a.preferred_text||'')+'</span><span class="tag q">SMS: '+esc(a.sms_status)+'</span><span style="margin-left:auto;color:#77715f">'+new Date(a.created_at).toLocaleString()+'</span></div>';});
    html+='<h3>Queued SMS (send via Twilio/make.com)</h3>';
    if(!notifs.length)html+='<div class="empty">Nothing queued — once Twilio is connected these send automatically.</div>';
    notifs.forEach(function(n){html+='<div class="row"><b>'+esc(n.to_phone)+'</b><span style="flex:1">'+esc((n.body||'').slice(0,90))+'…</span><span class="tag q">'+esc(n.kind)+'</span></div>';});
  }catch(e){ html+='<div class="empty">Could not load live data ('+esc(e.message||e)+').</div>'; }
  body.innerHTML=html;
  var imp=$('#uclhq-import');
  if(imp)imp.onclick=function(){importLeads();};
}
/* Shared import core: website chat leads → this user's contacts.
   Returns how many were added. Never reloads by itself. */
async function doImport(){
  var leads=(await sb.from('chat_leads').select('*').eq('status','new').order('created_at',{ascending:true}).limit(50)).data||[];
  if(!leads.length)return 0;
  var key='uclcc_data_'+CUR.email;
  var S=JSON.parse(localStorage.getItem(key)||'null'); if(!S)return 0;
  S.importedLeads=S.importedLeads||[];
  var added=0;
  leads.forEach(function(l){
    if(S.importedLeads.indexOf(l.id)>=0)return;
    var hot=/wrongful death|catastrophic/i.test(l.case_type||'');
    S.contacts.unshift({id:'web-'+l.id.slice(0,8),createdAt:new Date(l.created_at).getTime(),name:l.name||'Website lead',
      phone:(l.phone||'').replace(/\D/g,''),email:l.email||'',caseType:l.case_type||'Something else',
      language:l.lang==='es'?'Spanish':'English',source:'Website chat',stage:'New',hot:hot,accidentDate:null,
      govClaim:false,tags:['website'],notes:[{t:Date.now(),txt:'From website chat: '+(l.summary||'')}],firstResponseAt:null,assignedTo:''});
    S.importedLeads.push(l.id);added++;
  });
  if(added){
    S.activity=S.activity||[];S.activity.unshift({t:Date.now(),txt:'⚡ '+added+' website chat lead(s) auto-added'});
    localStorage.setItem(key,JSON.stringify(S));
  }
  for(var i=0;i<leads.length;i++){ await sb.from('chat_leads').update({status:'in-crm'}).eq('id',leads[i].id); }
  try{if(added)await sb.from('activities').insert({user_id:CUR.uid,email:CUR.email,type:'import_leads',detail:{count:added}});}catch(e){}
  return added;
}
async function importLeads(){ /* HQ button */
  try{
    var n=await doImport();
    badge(n?('Imported '+n+' lead(s)'):'No new leads');
    if(n)setTimeout(function(){location.reload();},900);
  }catch(e){ badge('Import failed'); }
}
/* Auto-flow: new website leads become contacts the moment you open the CRM,
   and a live watcher offers one-click adds while you work. */
async function autoImportBoot(){
  try{
    var n=await doImport();
    if(n>0){ badge('⚡ '+n+' website lead(s) added to your pipeline'); setTimeout(function(){location.reload();},800); return; }
  }catch(e){}
  startLeadWatch();
}
function startLeadWatch(){
  setInterval(async function(){
    try{
      var r=await sb.from('chat_leads').select('id',{count:'exact',head:true}).eq('status','new');
      if((r.count||0)>0)showLeadToast(r.count);
    }catch(e){}
  },60000);
}
function showLeadToast(n){
  var t=document.getElementById('ucl-leadtoast');
  if(t){t.textContent='⚡ '+n+' new website lead'+(n>1?'s':'')+' — tap to add';return;}
  t=document.createElement('button');t.id='ucl-leadtoast';
  t.style.cssText='position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:3500;background:linear-gradient(155deg,#f0cf6a,#d4a72c);color:#151004;border:none;border-radius:999px;padding:.7rem 1.2rem;font-weight:800;font-size:.88rem;cursor:pointer;box-shadow:0 16px 40px rgba(0,0,0,.55)';
  t.textContent='⚡ '+n+' new website lead'+(n>1?'s':'')+' — tap to add';
  t.onclick=async function(){ t.disabled=true;t.textContent='Adding…';
    try{var c=await doImport();badge('Imported '+c+' lead(s)');location.reload();}catch(e){t.remove();badge('Import failed');} };
  document.body.appendChild(t);
}

if(lo)lo.addEventListener('click',function(){

},true);

init();
})();
